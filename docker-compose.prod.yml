version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ztnas-postgres
    environment:
      POSTGRES_USER: ztnas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePassword123}
      POSTGRES_DB: ztnas_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ztnas_user -d ztnas_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ztnas-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ztnas-backend
    environment:
      DATABASE_URL: postgresql://ztnas_user:${DB_PASSWORD:-SecurePassword123}@postgres:5432/ztnas_prod
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-min-32-chars}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Password123!}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ztnas-network

  # Frontend Server
  frontend:
    image: nginx:alpine
    container_name: ztnas-frontend
    ports:
      - "5500:5500"
    volumes:
      - ./frontend/static:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - ztnas-network

volumes:
  postgres_data:
    driver: local

networks:
  ztnas-network:
    driver: bridge
