name: ZTNAS CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          echo "Pinned safety dependency:"
          grep -E '^safety==' requirements-dev.txt || true
          pip install -r requirements-dev.txt
          echo "Installed safety package details:"
          pip show safety || true

      - name: Lint (non-blocking)
        run: |
          flake8 app utils --count --statistics || true

      - name: Unit tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only-1234567890
          DATABASE_URL: sqlite:///./test.db
          DEBUG: "False"
          ENVIRONMENT: ci
          CORS_ORIGINS: '["http://localhost:5500"]'
        run: |
          pytest tests/unit/test_security_utils.py -q

      - name: Integration tests (backend test suite)
        env:
          SECRET_KEY: test-secret-key-for-ci-only-1234567890
          DATABASE_URL: sqlite:///./test.db
          DEBUG: "False"
          ENVIRONMENT: ci
          CORS_ORIGINS: '["http://localhost:5500"]'
        run: |
          pytest tests/test_auth.py tests/test_mfa.py tests/test_zero_trust.py -q || true

      - name: Security checks (non-blocking)
        run: |
          bandit -r app utils -q || true
          safety scan || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t ztnas-backend:ci ./backend

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          docker compose -f docker-compose.prod.yml config > /dev/null

  deploy-production:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Deployment placeholder
        run: |
          echo "Production deployment should be wired to your target infra (VM/K8s)."
          echo "Use scripts/deploy_production.sh with .env.prod on your deployment host."
