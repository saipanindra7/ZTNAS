<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZTNAS - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                       'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: #218838;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c00;
        }

        .success {
            background: #efe;
            color: #060;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #060;
        }

        .footer-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .footer-text a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: #0066cc;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← Back to Home</a>
        <div class="logo">🔐</div>
        <h1>Register</h1>
        <p class="subtitle">ZTNAS Zero Trust Network Access</p>

        <div id="error-message" class="error" style="display: none;"></div>
        <div id="success-message" class="success" style="display: none;"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Your username" minlength="3">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Min 8 characters" minlength="8">
                <div class="password-requirements">
                    ✓ Minimum 8 characters<br>
                    ✓ Mix of upper, lower, numbers recommended
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm password">
            </div>

            <div class="loading" id="loading">Creating account...</div>
            <button type="submit" class="btn">Register</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';

        async function handleRegister(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const loading = document.getElementById('loading');

            // Log registration input values for debugging
            console.log('=== REGISTRATION ATTEMPT ===');
            console.log('Email:', email);
            console.log('Username:', username);
            console.log('Username length:', username.length);
            console.log('Password length:', password.length);
            console.log('Password first char code:', password.charCodeAt(0));
            console.log('Confirm password length:', confirmPassword.length);

            // Clear messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match!';
                errorMsg.style.display = 'block';
                console.log('Passwords do not match!');
                return;
            }

            console.log('Passwords match, proceeding...');
            loading.style.display = 'block';

            try {
                const requestBody = {
                    email: email,
                    username: username,
                    password: password
                };
                
                console.log('Request body:', requestBody);
                console.log('Request body JSON:', JSON.stringify(requestBody));
                console.log('Request will be sent to:', `${API_BASE}/auth/register`);

                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (e) {
                    data = { detail: `Server error: ${response.status} ${response.statusText}` };
                }

                console.log('Response status:', response.status);
                console.log('Response status text:', response.statusText);
                console.log('Response data:', data);

                if (response.ok || response.status === 201) {
                    console.log('Registration successful! User ID:', data.id, 'Username:', data.username);
                    successMsg.textContent = 'Registration successful! Redirecting to login...';
                    successMsg.style.display = 'block';
                    
                    // Redirect to login
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    console.log('Registration failed:', data.detail);
                    errorMsg.textContent = data.detail || `Registration failed (${response.status}). Please try again.`;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Registration error:', error);
                console.error('Error message:', error.message);
                console.error('Trying to connect to:', `${API_BASE}/auth/register`);
                
                const errorText = error.message === 'Failed to fetch' 
                    ? 'Network error: Cannot reach API at http://localhost:8000. Make sure:\n1. Backend is running\n2. Check browser console (F12) for CORS errors'
                    : error.message;
                errorMsg.textContent = 'Error: ' + errorText;
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
